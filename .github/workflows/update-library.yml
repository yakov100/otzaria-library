name: Update Library and create manifest

on:
  # התזמון הועבר ל-weekly-pipeline.yml (הריצה השבועית) שמפעיל workflow זה
  # במקביל ל-SefariaExport ואז את בניית SeforimLibrary. אין כאן schedule
  # עצמאי כדי שלא ירוץ פעמיים.
  workflow_dispatch:

# הטריגר הישן - push על שינויים בנתיבים ספציפיים
#   push:
#     paths:
#       - "Ben-YehudaToOtzaria/ספרים/אוצריא/**"
#       - "DictaToOtzaria/ערוך/ספרים/אוצריא/**"
#       - "DictaToOtzaria/לא ערוך/ספרים/אוצריא/**"
#       - "OnYourWayToOtzaria/ספרים/אוצריא/**"
#       - "OraytaToOtzaria/ספרים/אוצריא/**"
#       - "tashmaToOtzaria/ספרים/אוצריא/**"
#       - "sefariaToOtzaria/sefaria_export/ספרים/אוצריא/**"
#       - "sefariaToOtzaria/sefaria_api/ספרים/אוצריא/**"
#       - "MoreBooks/ספרים/אוצריא/**"
#       - "ToratEmetToOtzaria/ספרים/אוצריא/**"
#       - "wikiJewishBooksToOtzaria/ספרים/אוצריא/**"
#       - "wikisourceToOtzaria/ספרים/אוצריא/**"
#       - "pninimToOtzaria/ספרים/אוצריא/**"
#       - "National-LibraryToOtzaria/ספרים/אוצריא/**"
#       - "Ben-YehudaToOtzaria/links/**"
#       - "DictaToOtzaria/links/**"
#       - "OnYourWayToOtzaria/links/**"
#       - "OraytaToOtzaria/links/**"
#       - "tashmaToOtzaria/links/**"
#       - "sefariaToOtzaria/sefaria_export/links/**"
#       - "sefariaToOtzaria/sefaria_api/links/**"
#       - "MoreBooks/links/**"
#       - "ToratEmetToOtzaria/links/**"
#       - "wikiJewishBooksToOtzaria/links/**"
#       - "wikisourceToOtzaria/links/**"
#       - "DictaToOtzaria/לא ערוך/links/**"
#       - "DictaToOtzaria/ערוך/links/**"
#       - "pninimToOtzaria/links/**"
#       - "National-LibraryToOtzaria/links/**"
permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    # if: github.actor != 'github-actions[bot]' && github.actor != 'github-actions'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 25

      - name: Pull LFS objects for packaging
        run: |
          git lfs pull
          git lfs checkout

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      # - name: update linker links
      #   run: |
      #     pip install -r linker/requirements.txt
      #     python linker/linker_on_commit.py

      - name: update in otzaria forum
        env:
          USER_NAME: ${{ secrets.USER_NAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TOKEN_YEMOT: ${{ secrets.TOKEN_YEMOT }}
          GOOGLE_CHAT_URL: ${{ secrets.GOOGLE_CHAT_URL }}
        run: |
          pip install bs4 requests pyluach tzdata
          python send_update/main.py
          
      - name: Sync files and folders
        run: |
          python sync_and_merge_folders.py

      - name: Generate New Files Manifest (New format - with full paths from sources)
        run: |          
          echo "{" > files_manifest.json
          
          # Add metadata.json (root file)
          if [ -f "./metadata.json" ]; then
            hash=$(sha256sum "./metadata.json" | cut -d" " -f1)
            echo "\"metadata.json\": {\"hash\": \"$hash\"}," >> files_manifest.json
          fi
          
          # Find all files in source directories (אוצריא files from all sources)
          find . \( \
            -path "./Ben-YehudaToOtzaria/ספרים/אוצריא/*" -o \
            -path "./DictaToOtzaria/ערוך/ספרים/אוצריא/*" -o \
            -path "./OnYourWayToOtzaria/ספרים/אוצריא/*" -o \
            -path "./OraytaToOtzaria/ספרים/אוצריא/*" -o \
            -path "./tashmaToOtzaria/ספרים/אוצריא/*" -o \
            -path "./sefariaToOtzaria/sefaria_export/ספרים/אוצריא/*" -o \
            -path "./sefariaToOtzaria/sefaria_api/ספרים/אוצריא/*" -o \
            -path "./MoreBooks/ספרים/אוצריא/*" -o \
            -path "./ToratEmetToOtzaria/ספרים/אוצריא/*" -o \
            -path "./wikisourceToOtzaria/ספרים/אוצריא/*" -o \
            -path "./wikiJewishBooksToOtzaria/ספרים/אוצריא/*" -o \
            -path "./pninimToOtzaria/ספרים/אוצריא/*" -o \
            -path "./National-LibraryToOtzaria/ספרים/אוצריא/*" \
          \) -type f \
          ! -path "./.git/*" \
          ! -path "./.github/*" \
          2>/dev/null | while read -r file; do
            path="${file#./}"
            hash=$(sha256sum "$file" | cut -d" " -f1)
            echo "\"$path\": {\"hash\": \"$hash\"},"
          done >> files_manifest.json
          
          # Find all link files from all sources
          find . \( \
            -path "./Ben-YehudaToOtzaria/links/*" -o \
            -path "./DictaToOtzaria/ערוך/links/*" -o \
            -path "./OnYourWayToOtzaria/links/*" -o \
            -path "./OraytaToOtzaria/links/*" -o \
            -path "./tashmaToOtzaria/links/*" -o \
            -path "./sefariaToOtzaria/sefaria_export/links/*" -o \
            -path "./sefariaToOtzaria/sefaria_api/links/*" -o \
            -path "./MoreBooks/links/*" -o \
            -path "./ToratEmetToOtzaria/links/*" -o \
            -path "./wikisourceToOtzaria/links/*" -o \
            -path "./wikiJewishBooksToOtzaria/links/*" -o \
            -path "./pninimToOtzaria/links/*" -o \
            -path "./National-LibraryToOtzaria/links/*" \
          \) -type f \
          ! -path "./.git/*" \
          ! -path "./.github/*" \
          2>/dev/null | while read -r file; do
            path="${file#./}"
            hash=$(sha256sum "$file" | cut -d" " -f1)
            echo "\"$path\": {\"hash\": \"$hash\"},"
          done >> files_manifest.json
          
          # Remove the trailing comma from the last entry and close the JSON
          sed -i '$ s/,$//' files_manifest.json
          echo "}" >> files_manifest.json

      - name: Generate dicta Files Manifest
        run: |
          echo "{" > files_manifest_dicta.json
          find "./DictaToOtzaria/לא ערוך/ספרים/אוצריא" -type f \
          ! -path "./.git/*" \
            ! -path "./.github/*" \
            2>/dev/null | while read -r file; do
              path="${file#./}"
              hash=$(sha256sum "$file" | cut -d" " -f1)
              echo "\"$path\": {\"hash\": \"$hash\"},"
          done >> files_manifest_dicta.json
          sed -i '$ s/,$//' files_manifest_dicta.json
          echo "}" >> files_manifest_dicta.json


      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # קריאת הגירסה החדשה מהקובץ שהתעדכן על ידי הסקריפט הפייתון
          VERSION=$(cat "MoreBooks/ספרים/אוצריא/אודות התוכנה/גירסת ספריה.txt")
          # ביצוע commit עם הודעה הכוללת את הגירסה
          git diff --staged --quiet || git commit -m "גרסת ספרייה $VERSION"
          # git diff --staged --quiet || git commit -m "Update files manifest and sync folders"
          git push
      - name: Create otzaria Release Archive
        run: |
          echo "Creating ZIP archive for אוצריא and links (keeping subfolders)..."

          # ZIP אוצריא מכל המקורות
          for src in \
            Ben-YehudaToOtzaria/ספרים/אוצריא \
            DictaToOtzaria/ערוך/ספרים/אוצריא \
            OnYourWayToOtzaria/ספרים/אוצריא \
            OraytaToOtzaria/ספרים/אוצריא \
            tashmaToOtzaria/ספרים/אוצריא \
            sefariaToOtzaria/sefaria_export/ספרים/אוצריא \
            sefariaToOtzaria/sefaria_api/ספרים/אוצריא \
            MoreBooks/ספרים/אוצריא \
            wikiJewishBooksToOtzaria/ספרים/אוצריא \
            wikisourceToOtzaria/ספרים/אוצריא \
            ToratEmetToOtzaria/ספרים/אוצריא \
            pninimToOtzaria/ספרים/אוצריא \
            National-LibraryToOtzaria/ספרים/אוצריא
          do
            if [ -d "$src" ]; then
              echo "Adding $src to ZIP..."
              parent=$(dirname "$src")      # תיקיה אב
              folder=$(basename "$src")     # אוצריא
              (cd "$parent" && zip -qr "$GITHUB_WORKSPACE/otzaria_latest.zip" "$folder")
            fi
          done

          # ZIP links מכל המקורות
          for src in \
            Ben-YehudaToOtzaria/links \
            DictaToOtzaria/ערוך/links \
            OnYourWayToOtzaria/links \
            OraytaToOtzaria/links \
            tashmaToOtzaria/links \
            sefariaToOtzaria/sefaria_export/links \
            sefariaToOtzaria/sefaria_api/links \
            MoreBooks/links \
            wikiJewishBooksToOtzaria/links \
            wikisourceToOtzaria/links \
            ToratEmetToOtzaria/links \
            pninimToOtzaria/links \
            National-LibraryToOtzaria/links
          do
            if [ -d "$src" ]; then
              echo "Adding $src to ZIP..."
              parent=$(dirname "$src")      # תיקיה אב
              folder=$(basename "$src")     # links
              (cd "$parent" && zip -qr "$GITHUB_WORKSPACE/otzaria_latest.zip" "$folder")
            fi
          done

          # Add manifest files
          zip -q "$GITHUB_WORKSPACE/otzaria_latest.zip" files_manifest.json metadata.json || true

          echo "Archive created successfully!"
      
      - name: Create dicta Release Archive
        run: |
          echo "Creating Dicta ZIP archive (flattening 'לא ערוך' folder)..."

          SRC="DictaToOtzaria/לא ערוך/ספרים"
          if [ -d "$SRC" ]; then
            (cd "$SRC" && zip -qr "$GITHUB_WORKSPACE/otzaria_dicta_latest.zip" *)
          else
            echo "Source not found: $SRC (skipping)"
          fi

          # Add manifest file
          zip -q "$GITHUB_WORKSPACE/otzaria_dicta_latest.zip" files_manifest_dicta.json || true

          echo "Dicta archive created successfully!"

      - name: Create Bavli PDF ZST Archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          export LANG=C.UTF-8
          export LC_ALL=C.UTF-8

          ARCHIVE_NAME="talmud_bavli_latest.tar.zst"
          SRC="MoreBooks/ספרים/אוצריא/תלמוד בבלי"
          PREV_RUN=$((GITHUB_RUN_NUMBER - 1))
          PREV_TAG="library-${PREV_RUN}"
          REBUILD_ARCHIVE=1

          validate_archive() {
            local archive_path="$1"
            zstd -t --quiet "$archive_path"
            tar --use-compress-program=unzstd -tf "$archive_path" > /dev/null
          }

          EVENT_BEFORE="$(jq -r '.before // empty' "$GITHUB_EVENT_PATH")"

          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ -n "$EVENT_BEFORE" ] && [ "$EVENT_BEFORE" != "0000000000000000000000000000000000000000" ]; then
            if git cat-file -e "${EVENT_BEFORE}^{commit}" 2>/dev/null; then
              if git diff --quiet "$EVENT_BEFORE" "$GITHUB_SHA" -- "$SRC"; then
                echo "No Bavli PDF changes detected in this push."
                REBUILD_ARCHIVE=0
              else
                echo "Bavli PDF changes detected in this push."
              fi
            else
              echo "Base commit is not available locally. Rebuilding Bavli archive."
            fi
          else
            REBUILD_ARCHIVE=0
          fi

          if [ "$REBUILD_ARCHIVE" -eq 0 ] && [ "$PREV_RUN" -gt 0 ]; then
            echo "Trying to reuse Bavli archive from release $PREV_TAG..."
            if gh release download "$PREV_TAG" -p "$ARCHIVE_NAME"; then
              if validate_archive "$ARCHIVE_NAME"; then
                echo "Reused Bavli archive from previous release."
                exit 0
              fi

              echo "Downloaded Bavli archive is invalid. Rebuilding..."
              rm -f "$ARCHIVE_NAME"
            fi

            echo "Previous Bavli archive not found. Rebuilding..."
          fi

          echo "Creating flattened ZST archive for Bavli PDFs..."

          STAGING_DIR="$(mktemp -d)"
          FLAT_DIR="$STAGING_DIR/תלמוד בבלי"

          mkdir -p "$FLAT_DIR"

          declare -A seen_files=()

          while IFS= read -r -d '' pdf; do
            base_name="$(basename "$pdf")"

            if [[ -n "${seen_files[$base_name]:-}" ]]; then
              echo "Duplicate PDF name detected while flattening: $base_name"
              echo "Existing: ${seen_files[$base_name]}"
              echo "Duplicate: $pdf"
              exit 1
            fi

            seen_files[$base_name]="$pdf"
            cp "$pdf" "$FLAT_DIR/$base_name"
          done < <(find "$SRC" -type f -iname '*.pdf' -print0)

          if [ -z "$(find "$FLAT_DIR" -maxdepth 1 -type f -iname '*.pdf' -print -quit)" ]; then
            echo "No PDF files found under $SRC"
            exit 1
          fi

          # Force POSIX/PAX tar metadata so UTF-8 filenames survive cross-platform extraction.
          tar --format=posix -C "$STAGING_DIR" -cf - "תלמוד בבלי" | zstd -19 -T0 -o "$GITHUB_WORKSPACE/$ARCHIVE_NAME"

          rm -rf "$STAGING_DIR"

          validate_archive "$GITHUB_WORKSPACE/$ARCHIVE_NAME"

          echo "Bavli archive created successfully!"


      - name: Create Release for this run
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # שם תג ייחודי לכל ריצה של ה־workflow
          TAG_NAME="library-${GITHUB_RUN_NUMBER}"

          echo "Creating release with tag: $TAG_NAME"

          gh release create "$TAG_NAME" \
            --latest \
            --title "Latest Otzaria Files" \
            --notes "Latest version of Otzaria files" \
            otzaria_latest.zip \
            otzaria_dicta_latest.zip \
            talmud_bavli_latest.tar.zst

          rm otzaria_latest.zip otzaria_dicta_latest.zip talmud_bavli_latest.tar.zst

      - name: Delete previous release to save space
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # חישוב מספר הריצה הקודמת
          PREV_RUN=$((GITHUB_RUN_NUMBER - 1))
          PREV_TAG="library-${PREV_RUN}"

          echo "Attempting to delete previous release: $PREV_TAG"

          # מחיקת ה-release והתג הקודם
          gh release delete "$PREV_TAG" --yes 2>/dev/null || echo "Previous release $PREV_TAG not found (OK)"
          git push --delete origin "$PREV_TAG" 2>/dev/null || echo "Previous tag $PREV_TAG not found (OK)"
